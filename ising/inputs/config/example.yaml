#################################
## General parameters
#################################

# Benchmark file name
benchmark: ./ising/benchmarks/MIMO/Nr5_Nt5_M16.txt

# Solver to use: [BRIM, SA, DSA, inSituSA, bSB, dSB, SCA, Multiplicative, CIM, all]
solvers:
  - bSB

# Number of trials
nb_runs: 5

# Use gurobi or not
use_gurobi: False

# Use multiprocessing or not
use_multiprocessing: False

nb_cores: 16

# Initialization seed
initialization_seed: 42

# Logging or not
gen_logfile: False
logfile_discrimination: None

#################################
## Solvers hyperparameters
#################################

# Parameters for SA
num_iterations_SA: 1
T: 50.0
T_final: 0.05
seed: 100

# Parameters for SCA
num_iterations_SCA: 1
T_final_SCA: 0.5
q: 0.0
q_final: 10.0

# Parameters for in-Situ SA
initial_temp_inSituSA: 690
T_final_inSituSA: 0.5
num_iterations_inSituSA: 1
nb_flips: 0.5

# Parameters for Multiplicative
num_iterations_Multiplicative: 1
dtMult: 0.01
nb_flipping: 100
cluster_threshold: 0.3
init_cluster_size: 0.8
end_cluster_size: 0.0625
exponent: 3.0
cluster_choice: "random"
current: 1.0
capacitance: 1
accumulation_delay: 0
broadcast_delay: 0
ode_choice: "FE"

# Parameters for BRIM
num_iterations_BRIM: 1
dtBRIM: 1e-6  # 10us
stop_criterion: 1e-6  # 1uV
resistance: 1
do_flipping: True
coupling_annealing: True

# Parameters for SB
num_iterations_SB: 1
dtSB: 0.01
a0: 1.0
c0: 0.0

# Parameters for CIM
num_iterations_CIM: 1
dtCIM: 0.25
zeta: 1.0

#################################
## Problems hyperparameters
#################################

# Parameters for TSP
weight_constant: 0

# Parameters for MIMO
SNR: 10
nb_trials: 100
mimo_seed: 12
is_hamming_encoding: False

#################################
## Specific Stages hyperparameters
#################################

# Parameters for quantization stage
quantization: False
quantization_precision: 1.5

# Parameters for npmos stage
offset_type: others
offset_ratio: 0.3

# Parameters for noise stage
device_noise: False
noise_level: 0.1

#################################
## Dummy creator hyperparameters
#################################
dummy_creator: True

# Parameters for dummy MIMO
dummy_seed: 42
dummy_qam: 4
dummy_snr: 8
dummy_user_num: 16
dummy_ant_num: 64
dummy_case_num: 10

# Parameters for dummy MaxCut
dummy_quadratic: False
dummy_local_optima: False

# Parameters for dummy MaxCut/TSP/ATSP/Knapsack
dummy_size: 20

# for TSP/ATSP
dummy_weight_constant: 0.0

# for dummy Knapsack
dummy_density: 1
dummy_penalty_value: 1.0
dummy_bit_width: 16
