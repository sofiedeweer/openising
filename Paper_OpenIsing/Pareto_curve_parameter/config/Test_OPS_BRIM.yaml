#################################
## General parameters
#################################

# Benchmark file name
benchmark: 
  - ./ising/benchmarks/G/G1.txt
  - ./ising/benchmarks/G/G6.txt
  - ./ising/benchmarks/G/G14.txt
  - ./ising/benchmarks/TSP/burma14.tsp
  - ./ising/benchmarks/TSP/ulysses16.tsp
  - ./ising/benchmarks/TSP/ulysses22.tsp
  - ./ising/benchmarks/Knapsack/jeu_100_25_1.txt
  - ./ising/benchmarks/Knapsack/jeu_200_25_1.txt
  - ./ising/benchmarks/Knapsack/jeu_100_50_1.txt

# Solver to use: [BRIM, SA, DSA, inSituSA, bSB, dSB, SCA, Multiplicative, CIM, all]
solvers:
  - BRIM

# Number of trials
nb_runs: 100

# Use gurobi or not
use_gurobi: False

# Use multiprocessing or not
use_multiprocessing: True

nb_cores: 8

# Initialization seed or use eigenvector of matrix
initialization_seed: 42
eigenvalue_start: False

# Logging or not
gen_logfile: False
logfile_discrimination: None
#################################
## Solvers hyperparameters
#################################

# Parameters for BRIM
num_iterations_BRIM: 500000
dtBRIM: 2.2e-11
stop_criterion: 1e-10  # 1uV
resistance: 31e3
capacitance: 49e-15
do_flipping: True
coupling_annealing: True
seed: 100
probability_start: 
  - 1e-3
  - 5e-3
  - 1e-2
  - 5e-2
  - 1e-1

#################################
## Problems hyperparameters
#################################

# Parameters for TSP
weight_constant: 1.2

# Parameters for MIMO
SNR: 10
nb_trials: 1
mimo_seed: 12
is_hamming_encoding: False

#################################
## Specific Stages hyperparameters
#################################

# Parameters for quantization stage
quantization: False
quantization_precision: 1.5
scale_to_integer: False

# Parameters for npmos stage
offset_type: others
offset_ratio: 0.3

# Parameters for noise stage
device_noise: False
noise_level: 0.1

mismatch_std: 0.0
combine_nodes: False
#################################
## Dummy creator hyperparameters
#################################
dummy_creator: False

# Parameters for dummy MIMO
dummy_seed: 42
dummy_qam: 4
dummy_snr: 8
dummy_spacing: 1.0
dummy_user_num: 16
dummy_ant_num: 64
dummy_case_num: 10

# Parameters for dummy MaxCut
dummy_quadratic: False
dummy_local_optima: False

# Parameters for dummy MaxCut/TSP/ATSP/Knapsack
dummy_size: 20

# for TSP/ATSP
dummy_weight_constant: 0.0

# for dummy Knapsack
dummy_density: 1
dummy_penalty_value: 1.0
dummy_bit_width: 16
